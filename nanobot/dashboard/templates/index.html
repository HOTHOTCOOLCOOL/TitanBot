<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobot Command Center</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --border-color: #334155;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --sidebar-width: 250px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #94a3b8;
            border-right: 3px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #0f172a;
            color: var(--accent-color);
            border-right-color: var(--accent-color);
        }

        .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }

        .sidebar-version {
            margin-top: auto;
            padding: 15px 20px;
            font-size: 0.75rem;
            color: #475569;
            border-top: 1px solid var(--border-color);
        }

        /* ── Hamburger (mobile) ── */
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px 12px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* ── Main ── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .header {
            height: 56px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: var(--card-bg);
            gap: 12px;
        }

        h2 { margin: 0; font-size: 1.15rem; font-weight: 500; }

        .status-pill {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--success);
        }
        .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Tabs ── */
        .tab-content {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Logs Console */
        .logs-container {
            flex: 1;
            background-color: #000;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 15px;
            overflow-y: auto;
            font-family: "Fira Code", "Cascadia Code", monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #d1d5db;
        }

        .log-entry { margin-bottom: 4px; }
        .log-time { color: #6b7280; margin-right: 10px; font-size: 0.8rem; }
        .log-agent { color: var(--accent-color); font-weight: 600; }
        .log-user { color: var(--success); font-weight: 600; }

        /* Editor */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .editor-label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px var(--accent-glow); }

        .btn {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            align-self: flex-end;
            transition: transform 0.15s, box-shadow 0.2s;
        }

        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .btn:active { transform: translateY(0); }

        /* Chat Input */
        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .chat-input {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .chat-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px var(--accent-glow); }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
        }
        .stat-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; color: var(--accent-color); }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .hamburger { display: block; }

            .header { padding: 0 12px; }
            .tab-content { padding: 12px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .chat-input-wrapper { flex-direction: column; }
            .btn { align-self: stretch; text-align: center; }
        }

        @media (max-width: 420px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">🐈 Nanobot</div>
        <div class="nav-item active" onclick="switchTab('activity', this)">
            <span class="nav-icon">📋</span> Activity Log
        </div>
        <div class="nav-item" onclick="switchTab('memory', this)">
            <span class="nav-icon">🧠</span> L1/L2 Memory
        </div>
        <div class="nav-item" onclick="switchTab('knowledge', this)">
            <span class="nav-icon">📚</span> Knowledge Base
        </div>
        <div class="nav-item" onclick="switchTab('system', this)">
            <span class="nav-icon">📊</span> System & Stats
        </div>
        <div class="sidebar-version">Nanobot v19 · Phase 19+</div>
    </div>

    <div class="main-content">
        <div class="header">
            <button class="hamburger" onclick="toggleSidebar()">☰</button>
            <h2 id="page-title">Activity Log</h2>
            <div class="status-pill"><div class="status-dot"></div> Online</div>
        </div>

        <!-- Activity Tab -->
        <div id="tab-activity" class="tab-content active">
            <div class="logs-container" id="logs">
                <div class="log-entry"><span class="log-time">System</span> <span class="log-agent">Nanobot Dashboard Online.</span></div>
            </div>
            <div class="chat-input-wrapper">
                <input type="text" id="chat-input" class="chat-input" placeholder="Message Nanobot directly here..." onkeypress="handleChatEnter(event)">
                <button class="btn" onclick="sendChatMessage()">Send</button>
            </div>
        </div>

        <!-- Memory Tab -->
        <div id="tab-memory" class="tab-content">
            <div class="editor-container">
                <span class="editor-label">MEMORY.md (Long-term Context)</span>
                <textarea id="memory-editor"></textarea>
                <button class="btn" onclick="saveMemory()">Save Changes</button>
            </div>
        </div>

        <!-- Knowledge Tab -->
        <div id="tab-knowledge" class="tab-content">
            <div class="editor-container">
                <span class="editor-label">tasks.json (Raw Internal Representation)</span>
                <textarea id="knowledge-editor" style="font-family: 'Fira Code', monospace;"></textarea>
                <button class="btn" onclick="saveKnowledge()">Save Config</button>
            </div>
        </div>

        <!-- System Tab -->
        <div id="tab-system" class="tab-content">
            <div class="stats-grid" id="stats-cards"></div>
            <div class="logs-container" id="stats-container" style="white-space: pre-wrap;">
                Loading system metrics...
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ── Toast ──
        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        // ── Sidebar (mobile) ──
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
        }

        // ── WebSocket Setup ──
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        let ws;

        function connectWS() {
            ws = new WebSocket(wsUrl);
            ws.onmessage = function(event) {
                const payload = JSON.parse(event.data);
                if (payload.type === 'log') {
                    appendLog(payload.data.sender, payload.data.message);
                }
                if (payload.type === 'notification') {
                    showToast('⚠️ ' + (payload.data.message || 'Alert'));
                }
            };
            ws.onclose = function() {
                setTimeout(connectWS, 2000);
            };
        }
        connectWS();

        function appendLog(sender, message) {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const cssClass = sender.toLowerCase() === 'user' ? 'log-user' : 'log-agent';
            const escaped = message.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            const html = `<div class="log-entry"><span class="log-time">[${time}]</span> <span class="${cssClass}">${sender}:</span> ${escaped}</div>`;
            logs.insertAdjacentHTML('beforeend', html);
            logs.scrollTop = logs.scrollHeight;
        }

        // ── Chat ──
        function handleChatEnter(e) {
            if (e.key === 'Enter') sendChatMessage();
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !ws) return;
            appendLog('User', text);
            ws.send(JSON.stringify({message: text}));
            input.value = '';
        }

        // ── Tabs ──
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));

            document.getElementById(`tab-${tabId}`).classList.add('active');
            if (el) el.classList.add('active');

            const titles = {
                'activity': 'Activity Log',
                'memory': 'L1/L2 Memory Management',
                'knowledge': 'Knowledge Base (Tasks)',
                'system': 'System & Metrics Dashboard'
            };
            document.getElementById('page-title').textContent = titles[tabId];

            if (tabId === 'memory') fetchMemory();
            if (tabId === 'knowledge') fetchKnowledge();
            if (tabId === 'system') fetchStats();

            closeSidebar();
        }

        // ── Stats ──
        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();

                // Render summary cards
                const cards = document.getElementById('stats-cards');
                const highlights = [
                    {label: 'Uptime', value: data.uptime_seconds ? Math.round(data.uptime_seconds/60) + 'm' : '-'},
                    {label: 'Tool Executions', value: data.counters?.tool_executions_count || 0},
                    {label: 'LLM Calls', value: data.timers?.llm_call?.count || 0},
                    {label: 'Errors', value: data.counters?.message_error_count || 0},
                ];
                cards.innerHTML = highlights.map(h =>
                    `<div class="stat-card"><div class="label">${h.label}</div><div class="value">${h.value}</div></div>`
                ).join('');

                // Raw JSON
                document.getElementById('stats-container').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('stats-container').textContent = 'Error fetching stats.';
            }
        }

        setInterval(() => {
            if (document.getElementById('tab-system').classList.contains('active')) fetchStats();
        }, 5000);

        // ── Memory ──
        async function fetchMemory() {
            const res = await fetch('/api/memory');
            const data = await res.json();
            document.getElementById('memory-editor').value = data.content || '';
        }

        async function saveMemory() {
            const content = document.getElementById('memory-editor').value;
            await fetch('/api/memory', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content})
            });
            showToast('✅ Memory saved successfully!');
        }

        // ── Knowledge ──
        async function fetchKnowledge() {
            const res = await fetch('/api/tasks');
            const data = await res.json();
            document.getElementById('knowledge-editor').value = JSON.stringify(data.tasks, null, 2);
        }

        async function saveKnowledge() {
            try {
                const content = document.getElementById('knowledge-editor').value;
                const tasks = JSON.parse(content);
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({tasks})
                });
                showToast('✅ Knowledge base saved!');
            } catch (e) {
                showToast('❌ Invalid JSON formatting!');
            }
        }
    </script>
</body>
</html>
